name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    env:
      ENABLE_CODEQL: ${{ vars.ENABLE_CODEQL }}

    steps:
      - name: Skip when Advanced Security is not enabled for this repo
        if: ${{ env.ENABLE_CODEQL != 'true' }}
        run: |
          echo "Skipping CodeQL."
          echo "Enable GitHub Advanced Security and set repository variable ENABLE_CODEQL=true to run CodeQL analysis."

      - name: Checkout
        if: ${{ env.ENABLE_CODEQL == 'true' }}
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        if: ${{ env.ENABLE_CODEQL == 'true' }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        if: ${{ env.ENABLE_CODEQL == 'true' }}
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        if: ${{ env.ENABLE_CODEQL == 'true' }}
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
