name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Generate Prisma client
        run: |
          rm -rf apps/web/node_modules/.prisma
          mkdir -p apps/web/node_modules/@prisma
          cp -a node_modules/@prisma/client apps/web/node_modules/@prisma/client
          cd apps/web && PRISMA_GENERATE_SKIP_AUTOINSTALL=1 npx prisma generate
      - name: TypeScript check
        run: cd apps/web && npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Lint
        run: cd apps/web && npx eslint --max-warnings 0 'src/**/*.{ts,tsx}' || true

  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build Storybook
        run: cd apps/web && npm run build-storybook

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks CLI
        env:
          GITLEAKS_VERSION: '8.24.2'
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Gitleaks
        run: |
          gitleaks git \
            --redact \
            --verbose \
            --report-format sarif \
            --report-path gitleaks.sarif
